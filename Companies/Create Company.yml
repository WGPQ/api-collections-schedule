info:
  name: Create Company
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/api/companies'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Mi Empresa"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status >= 200 && res.status < 300 && res.body && res.body.id) {
          bru.setEnvVar("companyId", res.body.id)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
