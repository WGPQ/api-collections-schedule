info:
  name: List Audit Logs
  type: http
  seq: 1

http:
  method: GET
  url: '{{baseUrl}}/api/audit-logs'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
  params:
    - name: fromUtc
      value: ''
      type: query
      disabled: true
    - name: toUtc
      value: ''
      type: query
      disabled: true
    - name: userId
      value: ''
      type: query
      disabled: true
    - name: entityId
      value: ''
      type: query
      disabled: true
    - name: category
      value: ''
      type: query
      disabled: true
    - name: action
      value: ''
      type: query
      disabled: true
    - name: entityType
      value: ''
      type: query
      disabled: true
    - name: page
      value: '1'
      type: query
    - name: pageSize
      value: '20'
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Lista logs de auditoria de la empresa activa.

  Respuesta paginada con `items` y `meta`.
