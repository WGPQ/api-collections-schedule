name: Get Slots
description: Consultar slots disponibles para reservas online.
request:
  method: GET
  path: /api/calendar/slots
  query:
    companyId: "{{companyId}}"
    responsibleUserId: 00000000-0000-0000-0000-000000000000
    fromDate: "2026-05-24"
    toDate: "2026-05-31"
    durationMinutes: 30
    slotIntervalMinutes: 30
    timeZone: America/Guayaquil
responses:
  success: 200
