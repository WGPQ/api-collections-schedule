name: Update Break
description: Actualizar break.
request:
  method: PUT
  path: /api/calendar/breaks/{{breakId}}
  headers:
    Authorization: Bearer {{accessToken}}
    X-Company-Id: "{{companyId}}"
    Content-Type: application/json
  body:
    responsibleUserId: 00000000-0000-0000-0000-000000000000
    title: Almuerzo extendido
    notes: Break actualizado
    startAtUtc: "2026-05-24T18:00:00Z"
    endAtUtc: "2026-05-24T19:30:00Z"
    timeZone: America/Guayaquil
    color: "#f59e0b"
responses:
  success: 200
