name: Update Role
description: Actualizar rol de un usuario de la empresa.
request:
  method: PUT
  path: /api/company-users/{{companyUserId}}/role
  headers:
    Authorization: Bearer {{accessToken}}
    X-Company-Id: "{{companyId}}"
    Content-Type: application/json
  body:
    role: Admin
responses:
  success: 200
