info:
  name: Update Client
  type: http
  seq: 3

http:
  method: PUT
  url: '{{baseUrl}}/api/clients/{{clientId}}'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "firstName": "John",
        "lastName": "Doe",
        "email": "john@example.com",
        "phone": "0999999999",
        "notes": "Cliente actualizado",
        "isActive": true
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
