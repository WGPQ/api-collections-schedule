info:
  name: List Clients
  type: http
  seq: 1

http:
  method: GET
  url: '{{baseUrl}}/api/clients'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
  params:
    - name: q
      value: ''
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
