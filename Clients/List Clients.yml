info:
  name: List Clients
  type: http
  seq: 1

http:
  method: GET
  url: '{{baseUrl}}/api/clients'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
  params:
    - name: q
      value: ''
      type: query
      disabled: true
    - name: page
      value: '1'
      type: query
    - name: pageSize
      value: '20'
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Busca clientes por nombre, telefono o email.

  Respuesta paginada con `items` y `meta`.
