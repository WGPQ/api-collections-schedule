info:
  name: Create Client
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/api/clients'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "firstName": "John",
        "lastName": "Doe",
        "email": "john@example.com",
        "phone": "0999999999",
        "notes": "Cliente de prueba"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if ((res.status === 200 || res.status === 201) && res.body && res.body.id) {
          bru.setEnvVar("clientId", res.body.id)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
