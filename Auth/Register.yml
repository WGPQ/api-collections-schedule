info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: '{{baseUrl}}/api/auth/register'
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "firstName": "Admin",
        "lastName": "Principal",
        "email": "admin@example.com",
        "password": "Admin123*"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Registrar usuario inicial.
