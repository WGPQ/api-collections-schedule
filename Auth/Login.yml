info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/api/auth/login'
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "admin@example.com",
        "password": "Admin123*"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200 && res.body && res.body.accessToken) {
          bru.setEnvVar("accessToken", res.body.accessToken)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Login y captura automatica del accessToken.
