info:
  name: Reset Password
  type: http
  seq: 5

http:
  method: POST
  url: '{{baseUrl}}/api/auth/reset-password'
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "token": "REPLACE_ME",
        "newPassword": "NewPassword123*"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Restablecer contraseña con token.
