info:
  name: Update Role
  type: http
  seq: 4

http:
  method: PUT
  url: '{{baseUrl}}/api/company-users/{{companyUserId}}/role'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "role": "Admin"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
