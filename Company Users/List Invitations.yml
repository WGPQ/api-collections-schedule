info:
  name: List Invitations
  type: http
  seq: 2

http:
  method: GET
  url: '{{baseUrl}}/api/company-users/invitations'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
  params:
    - name: page
      value: '1'
      type: query
    - name: pageSize
      value: '20'
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Lista las invitaciones de la empresa activa.

  Respuesta paginada con `items` y `meta`.
