info:
  name: Invite User
  type: http
  seq: 3

http:
  method: POST
  url: '{{baseUrl}}/api/company-users/invitations'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "staff@example.com",
        "role": "Staff"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status >= 200 && res.status < 300 && res.body && res.body.invitationToken) {
          bru.setEnvVar("invitationToken", res.body.invitationToken)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
