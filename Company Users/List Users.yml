info:
  name: List Users
  type: http
  seq: 1

http:
  method: GET
  url: '{{baseUrl}}/api/company-users'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
