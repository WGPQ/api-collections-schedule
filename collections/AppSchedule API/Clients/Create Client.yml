name: Create Client
description: Crear cliente.
request:
  method: POST
  path: /api/clients
  headers:
    Authorization: Bearer {{accessToken}}
    X-Company-Id: "{{companyId}}"
    Content-Type: application/json
  body:
    firstName: John
    lastName: Doe
    email: john@example.com
    phone: "0999999999"
    notes: Cliente de prueba
responses:
  success: 201
