name: Update Client
description: Actualizar cliente.
request:
  method: PUT
  path: /api/clients/{{clientId}}
  headers:
    Authorization: Bearer {{accessToken}}
    X-Company-Id: "{{companyId}}"
    Content-Type: application/json
  body:
    firstName: John
    lastName: Doe
    email: john@example.com
    phone: "0999999999"
    notes: Cliente actualizado
    isActive: true
responses:
  success: 200
