name: Update Appointment
description: Actualizar cita.
request:
  method: PUT
  path: /api/calendar/appointments/{{appointmentId}}
  headers:
    Authorization: Bearer {{accessToken}}
    X-Company-Id: "{{companyId}}"
    Content-Type: application/json
  body:
    responsibleUserId: 00000000-0000-0000-0000-000000000000
    clientId: "{{clientId}}"
    title: Consulta inicial actualizada
    notes: Reprogramada
    startAtUtc: "2026-05-24T16:00:00Z"
    endAtUtc: "2026-05-24T16:30:00Z"
    timeZone: America/Guayaquil
    color: "#2563eb"
    isOnlineBooking: true
    markCompleted: false
responses:
  success: 200
