name: Update Availability Rule
description: Actualizar regla de disponibilidad.
request:
  method: PUT
  path: /api/calendar/availability-rules/{{ruleId}}
  headers:
    Authorization: Bearer {{accessToken}}
    X-Company-Id: "{{companyId}}"
    Content-Type: application/json
  body:
    responsibleUserId: 00000000-0000-0000-0000-000000000000
    dayOfWeek: Monday
    startTime: "09:00:00"
    endTime: "18:00:00"
    isActive: true
responses:
  success: 200
