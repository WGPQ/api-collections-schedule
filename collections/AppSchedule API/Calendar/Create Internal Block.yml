name: Create Internal Block
description: Crear bloqueo interno.
request:
  method: POST
  path: /api/calendar/internal-blocks
  headers:
    Authorization: Bearer {{accessToken}}
    X-Company-Id: "{{companyId}}"
    Content-Type: application/json
  body:
    responsibleUserId: 00000000-0000-0000-0000-000000000000
    title: Reunión interna
    notes: No agendar en este horario
    startAtUtc: "2026-05-24T20:00:00Z"
    endAtUtc: "2026-05-24T21:00:00Z"
    timeZone: America/Guayaquil
    color: "#ef4444"
responses:
  success: 200
