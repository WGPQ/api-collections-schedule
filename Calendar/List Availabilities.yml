info:
  name: List Availabilities
  type: http
  seq: 11

http:
  method: GET
  url: '{{baseUrl}}/api/calendar/availabilities'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
  params:
    - name: fromUtc
      value: '2026-05-24T00:00:00Z'
      type: query
    - name: toUtc
      value: '2026-05-31T00:00:00Z'
      type: query
    - name: responsibleUserId
      value: '{{responsibleUserId}}'
      type: query
      disabled: true
    - name: page
      value: '1'
      type: query
    - name: pageSize
      value: '20'
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Lista eventos de tipo availability.

  Son franjas indicativas de disponibilidad y no validan por si mismas la creacion de citas.
