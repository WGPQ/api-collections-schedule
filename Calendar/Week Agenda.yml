info:
  name: Week Agenda
  type: http
  seq: 3

http:
  method: GET
  url: '{{baseUrl}}/api/calendar/agenda/week'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
  params:
    - name: date
      value: '2026-05-24'
      type: query
    - name: responsibleUserId
      value: '{{responsibleUserId}}'
      type: query
      disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
