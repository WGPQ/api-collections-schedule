info:
  name: Create Availability Rule
  type: http
  seq: 12

http:
  method: POST
  url: '{{baseUrl}}/api/calendar/availability-rules'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "responsibleUserId": "{{responsibleUserId}}",
        "dayOfWeek": 1,
        "startTime": "09:00:00",
        "endTime": "17:00:00"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status >= 200 && res.status < 300 && res.body && res.body.id) {
          bru.setEnvVar("ruleId", res.body.id)
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
