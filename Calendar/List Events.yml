info:
  name: List Events
  type: http
  seq: 1

http:
  method: GET
  url: '{{baseUrl}}/api/calendar/events'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'
  params:
    - name: fromUtc
      value: '2026-05-24T00:00:00Z'
      type: query
    - name: toUtc
      value: '2026-05-31T00:00:00Z'
      type: query
    - name: responsibleUserId
      value: '{{responsibleUserId}}'
      type: query
    - name: clientId
      value: '{{clientId}}'
      type: query
      disabled: true
    - name: type
      value: ''
      type: query
      disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
