info:
  name: Get Slots
  type: http
  seq: 14

http:
  method: GET
  url: '{{baseUrl}}/api/calendar/slots'
  params:
    - name: companyId
      value: '{{companyId}}'
      type: query
    - name: responsibleUserId
      value: '{{responsibleUserId}}'
      type: query
    - name: fromDate
      value: '2026-05-24'
      type: query
    - name: toDate
      value: '2026-05-31'
      type: query
    - name: durationMinutes
      value: '30'
      type: query
    - name: slotIntervalMinutes
      value: '30'
      type: query
    - name: timeZone
      value: 'America/Guayaquil'
      type: query
    - name: page
      value: '1'
      type: query
    - name: pageSize
      value: '20'
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Obtiene slots disponibles para reserva online.

  Respuesta paginada por dia con `items` y `meta`.
