info:
  name: Cancel Event
  type: http
  seq: 10

http:
  method: POST
  url: '{{baseUrl}}/api/calendar/events/{{appointmentId}}/cancel'
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
    - name: X-Company-Id
      value: '{{companyId}}'

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
